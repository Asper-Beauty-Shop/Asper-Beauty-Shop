# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will install Deno then run `deno lint` and `deno test`.
# For more information see: https://github.com/denoland/setup-deno

name: Deno

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        # uses: denoland/setup-deno@v1
        uses: denoland/setup-deno@61fe2df320078202e33d7d5ad347e7dcfa0e8f31 # v1.1.2
        with:
          deno-version: v1.x

      - name: Verify formatting
        run: deno fmt --check

      - name: Run linter
        run: deno lint supabase/functions

      - name: Type-check edge functions
        run: deno check supabase/functions/*/index.ts

      - name: Run tests
        run: |
          TEST_FILES="$(
            git ls-files \
              '*_test.ts' '*_test.tsx' '*_test.js' '*_test.jsx' '*_test.mjs' \
              'test.ts' 'test.tsx' 'test.js' 'test.jsx' 'test.mjs'
          )"

          if [ -n "$TEST_FILES" ]; then
            deno test --allow-read --allow-net --allow-env supabase/functions
          else
            echo "No Deno test modules found; skipping."
          fi
