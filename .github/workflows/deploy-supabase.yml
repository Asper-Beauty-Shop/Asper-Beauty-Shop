# Supabase Edge Functions and Database Deployment
# This workflow deploys Edge Functions and runs database migrations on push to main

name: Deploy Supabase

on:
  push:
    branches: ["main"]
    paths:
      - 'supabase/**'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: rgehleqcubtmcwyipyvi

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Deploy all Edge Functions
          supabase functions deploy dr-rose-gateway --project-ref $SUPABASE_PROJECT_REF
          supabase functions deploy meta-webhook --project-ref $SUPABASE_PROJECT_REF
          supabase functions deploy whatsapp-webhook --project-ref $SUPABASE_PROJECT_REF
          supabase functions deploy tray --project-ref $SUPABASE_PROJECT_REF
          supabase functions deploy beauty-assistant --project-ref $SUPABASE_PROJECT_REF
          supabase functions deploy bulk-product-upload --project-ref $SUPABASE_PROJECT_REF

  deploy-migrations:
    runs-on: ubuntu-latest
    needs: deploy-functions
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Database Migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Link to project and run migrations
          supabase link --project-ref $SUPABASE_PROJECT_REF
          supabase db push
